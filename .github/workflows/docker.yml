name: Docker Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: beniweza
          password: ${{ secrets.BENIWEZA }}
      - name: Build and Push
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: beniweza/mon-app-docker:latest
